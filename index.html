        <style>
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            padding-top: 40px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
        }

        .lightbox-content {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 30px;
        }

        .lightbox-left {
            width: 60%;
            text-align: center;
        }

        .lightbox-right {
            width: 40%;
            color: #fff;
        }

        .lightbox-img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .thumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .thumbs img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }

        .thumbs img:hover {
            opacity: 1;
        }

        .thumbs img.active-thumb {
            border: 2px solid #fff;
            opacity: 1;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
        }
        </style>

        <!-- GitHub Actions Form Script -->
        <script>
        async function sendToGitHub(data) {
          await fetch("https://api.github.com/repos/davapre/convo/dispatches", {
            method: "POST",
            headers: {
              "Accept": "application/vnd.github+json",
              "Authorization": "Bearer YOUR_TOKEN_HERE",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              event_type: "new_message",
              client_payload: {
                json: JSON.stringify(data),
                timestamp: Date.now()
              }
            })
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          const form = document.getElementById("convoForm");
          if (!form) return;

          form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(form);
            const data = {};

            formData.forEach((value, key) => {
              data[key] = value;
            });

            await sendToGitHub(data);

            form.reset();
            window.location.hash = "#home";
          });
        });
        </script>

        <!-- Lightbox Script -->
        <script>
        $(document).ready(function() {

            const images = $(".image.fit");
            const topThumbs = $(".top-thumbs");
            const bottomThumbs = $(".bottom-thumbs");

            // Crear miniaturas arriba y abajo
            images.each(function(index) {
                const src = $(this).find("img").attr("src");
                const text = $(this).data("text") || "";

                const thumb = $("<img>")
                    .attr("src", src)
                    .attr("data-index", index)
                    .attr("data-text", text);

                if (index < 6) topThumbs.append(thumb);
                else bottomThumbs.append(thumb);
            });

            function showImage(index) {
                const img = images.eq(index).find("img").attr("src");
                const text = images.eq(index).data("text");

                $(".lightbox-img").attr("src", img);
                $(".lightbox-title").text("Proyecto " + (index + 1));
                $(".lightbox-text").text(text);

                $(".thumbs img").removeClass("active-thumb");
                $(`.thumbs img[data-index="${index}"]`).addClass("active-thumb");
            }

            // Abrir lightbox desde la cuadrícula
            images.click(function(e) {
                e.preventDefault();
                const index = images.index(this);

                $("#lightbox").fadeIn();
                showImage(index);
            });

            // Cambiar imagen desde miniaturas
            $(".thumbs").on("click", "img", function() {
                const index = $(this).data("index");
                showImage(index);
            });

            // Cerrar
            $(".close, #lightbox").click(function(e) {
                if (e.target !== this) return;
                $("#lightbox").fadeOut();
            });

            $(".lightbox-img").click(function(e) {
                e.stopPropagation();
            });
        });
        </script>
