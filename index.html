<style>
.lightbox {
    display:none; position:fixed; z-index:9999; padding-top:40px;
    left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85);
}
.lightbox-content {
    width:90%; max-width:1200px; margin:auto; background:#111; padding:20px;
    border-radius:10px; display:flex; gap:30px; height:80vh; align-items:center;
    position:relative;
}
.lightbox-left {
    width:60%; display:flex; flex-direction:column; justify-content:center;
    align-items:center; height:100%;
}
.lightbox-right {
    width:40%; background:#fff; color:#000; padding:30px; border-radius:10px;
    height:100%; overflow-y:auto;
}
.lightbox-img {
    max-width:100%; border-radius:8px; margin:20px 0; transition:transform 0.2s ease;
}
.thumbs { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.thumbs img {
    width:70px; height:70px; object-fit:cover; border-radius:6px; cursor:pointer;
    opacity:0.7; transition:0.2s;
}
.thumbs img:hover { opacity:1; }
.thumbs img.active-thumb { border:2px solid #fff; opacity:1; }
.close {
    position:absolute; top:20px; right:35px; color:#fff; font-size:40px; cursor:pointer;
}
.nav-arrow {
    display:none; position:absolute; top:45%; font-size:50px; color:white;
    cursor:pointer; user-select:none; z-index:99999;
}
.left-arrow { left:10px; }
.right-arrow { right:10px; }

/* MOBILE */
@media (max-width:768px) {
    .lightbox-content { flex-direction:column; height:auto; padding-bottom:40px; }
    .lightbox-left { width:100%; height:auto; }
    .lightbox-right { width:100%; height:auto; margin-top:20px; }
    .thumbs { display:none; }
    .nav-arrow { display:block; }
}
</style>

<!-- GitHub Actions -->
<script>
async function sendToGitHub(data) {
  await fetch("https://api.github.com/repos/davapre/convo/dispatches", {
    method:"POST",
    headers:{
      "Accept":"application/vnd.github+json",
      "Authorization":"Bearer YOUR_TOKEN_HERE",
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      event_type:"new_message",
      client_payload:{ json:JSON.stringify(data), timestamp:Date.now() }
    })
  });
}
document.addEventListener("DOMContentLoaded",function(){
  const form=document.getElementById("convoForm");
  if(!form)return;
  form.addEventListener("submit",async function(e){
    e.preventDefault();
    const formData=new FormData(form);
    const data={};
    formData.forEach((v,k)=>data[k]=v);
    await sendToGitHub(data);
    form.reset();
    window.location.hash="#home";
  });
});
</script>

<!-- LIGHTBOX + SWIPE + PINCH -->
<script>
$(document).ready(function(){

    const images=$(".image.fit");
    const topThumbs=$(".top-thumbs");
    const bottomThumbs=$(".bottom-thumbs");
    let currentIndex=0;

    images.each(function(i){
        const src=$(this).find("img").attr("src");
        const text=$(this).data("text")||"";
        const thumb=$("<img>").attr("src",src).attr("data-index",i).attr("data-text",text);
        if(i<6) topThumbs.append(thumb); else bottomThumbs.append(thumb);
    });

    function showImage(i){
        currentIndex=i;
        const img=images.eq(i).find("img").attr("src");
        const text=images.eq(i).data("text");
        $(".lightbox-img").attr("src",img);
        $(".lightbox-title").text("Proyecto "+(i+1));
        $(".lightbox-text").text(text);
        $(".thumbs img").removeClass("active-thumb");
        $(`.thumbs img[data-index="${i}"]`).addClass("active-thumb");
        resetZoom();
    }

    images.click(function(e){
        e.preventDefault();
        const i=images.index(this);
        $("#lightbox").fadeIn();
        showImage(i);
    });

    $(".thumbs").on("click","img",function(){
        showImage($(this).data("index"));
    });

    $(".left-arrow").click(()=>showImage((currentIndex-1+images.length)%images.length));
    $(".right-arrow").click(()=>showImage((currentIndex+1)%images.length));

    $(document).on("keydown",function(e){
        if(!$("#lightbox").is(":visible"))return;
        if(e.key==="ArrowRight") showImage((currentIndex+1)%images.length);
        if(e.key==="ArrowLeft") showImage((currentIndex-1+images.length)%images.length);
        if(e.key==="Escape") $("#lightbox").fadeOut();
    });

    $(".close,#lightbox").click(function(e){
        if(e.target!==this)return;
        $("#lightbox").fadeOut();
    });

    $(".lightbox-img").click(e=>e.stopPropagation());

    /* SWIPE + PINCH + ZOOM */
    const imgEl=document.querySelector(".lightbox-img");
    const hammer=new Hammer(imgEl);

    hammer.get("pinch").set({enable:true});
    hammer.get("pan").set({direction:Hammer.DIRECTION_ALL});
    hammer.get("swipe").set({direction:Hammer.DIRECTION_HORIZONTAL});

    let scale=1, lastScale=1, posX=0, posY=0, lastPosX=0, lastPosY=0;

    function resetZoom(){
        scale=1; lastScale=1; posX=0; posY=0; lastPosX=0; lastPosY=0;
        imgEl.style.transform="translate(0px,0px) scale(1)";
    }

    hammer.on("doubletap",function(){
        scale=scale>1?1:2;
        imgEl.style.transform=`scale(${scale})`;
    });

    hammer.on("pinch",function(ev){
        scale=Math.max(1,Math.min(lastScale*ev.scale,4));
        imgEl.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;
    });

    hammer.on("pinchend",function(){
        lastScale=scale;
    });

    hammer.on("pan",function(ev){
        if(scale<=1)return;
        posX=lastPosX+ev.deltaX;
        posY=lastPosY+ev.deltaY;
        imgEl.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;
    });

    hammer.on("panend",function(){
        lastPosX=posX;
        lastPosY=posY;
    });

    hammer.on("swipeleft",()=>showImage((currentIndex+1)%images.length));
    hammer.on("swiperight",()=>showImage((currentIndex-1+images.length)%images.length));

});
</script>
