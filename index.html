        <!-- Lightbox -->
        <div id="lightbox" class="lightbox">
            <span class="close">&times;</span>
            <img class="lightbox-img" src="" alt="">
            <p class="lightbox-text"></p>
        </div>

        <style>
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.85);
            text-align: center;
        }
        .lightbox-img {
            max-width: 80%;
            margin: 20px auto;
            border-radius: 8px;
        }
        .lightbox-text {
            color: #fff;
            font-size: 1.2em;
            max-width: 70%;
            margin: 0 auto;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
        }
        </style>

        <!-- Scripts -->

        <!-- GitHub Actions Form Script -->
        <script>
        async function sendToGitHub(data) {
          await fetch("https://api.github.com/repos/davapre/convo/dispatches", {
            method: "POST",
            headers: {
              "Accept": "application/vnd.github+json",
              "Authorization": "Bearer YOUR_TOKEN_HERE",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              event_type: "new_message",
              client_payload: {
                json: JSON.stringify(data),
                timestamp: Date.now()
              }
            })
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          const form = document.getElementById("convoForm");
          if (!form) return;

          form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(form);
            const data = {};

            formData.forEach((value, key) => {
              data[key] = value;
            });

            await sendToGitHub(data);

            form.reset();
            window.location.hash = "#home";
          });
        });
        </script>

        <!-- Lightbox Script -->
        <script>
        $(document).ready(function() {
            $(".image.fit").click(function(e) {
                e.preventDefault();

                const imgSrc = $(this).find("img").attr("src");
                const text = $(this).data("text") || "";

                $(".lightbox-img").attr("src", imgSrc);
                $(".lightbox-text").text(text);

                $("#lightbox").fadeIn();
            });

            $(".close, #lightbox").click(function() {
                $("#lightbox").fadeOut();
            });

            $(".lightbox-img").click(function(e) {
                e.stopPropagation();
            });
        });
        </script>
