<!-- ⭐ Script para enviar el formulario en popup y cerrar -->
<script>
document.getElementById("sendForm").addEventListener("click", function(event) {
event.preventDefault(); // Evita el envío normal

// Abre una ventana nueva
const popup = window.open("", "formWindow", "width=400,height=300");

// Crea un formulario oculto dentro de la ventana
popup.document.write(`
	<form id="hiddenForm" action="https://formspree.io/f/xvzjvyer" method="POST">
		<input type="hidden" name="name" value="${document.querySelector('input[name=name]').value}">
		<input type="hidden" name="email" value="${document.querySelector('input[name=email]').value}">
		<input type="hidden" name="subject" value="${document.querySelector('input[name=subject]').value}">
		<input type="hidden" name="message" value="${document.querySelector('textarea[name=message]').value}">
		<input type="hidden" name="_subject" value="Nuevo mensaje desde tu web">
	</form>
	<p>Enviando mensaje...</p>
`);

// Envía el formulario dentro del popup
popup.document.getElementById("hiddenForm").submit();

// Cierra la ventana después de 2 segundos
setTimeout(() => {
	popup.close();
}, 2000);

// Limpia el formulario original
document.querySelector('input[name=name]').value = "";
document.querySelector('input[name=email]').value = "";
document.querySelector('input[name=subject]').value = "";
document.querySelector('textarea[name=message]').value = "";

// Vuelve al home
window.location.hash = "#home";
});
</script>
